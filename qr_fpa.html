  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2D4279;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      padding: 40px 20px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .logo-badge {
      width: 48px;
      height: 48px;
      background: #A28A70;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
      letter-spacing: 0.5px;
    }
    .logo-text {
      font-size: 13px;
      letter-spacing: 3px;
      color: #A28A70;
      text-transform: uppercase;
      font-weight: 600;
    }
    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      color: #A28A70;
      text-transform: uppercase;
      border: 1px solid rgba(162,138,112,0.4);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 8px;
    }
    h1 span { color: #A28A70; }
    .formation-code {
      font-size: 16px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .qr-wrapper {
      background: white;
      padding: 22px;
      border-radius: 20px;
      margin-bottom: 36px;
      box-shadow: 0 0 0 8px rgba(162,138,112,0.15);
    }
    .qr-wrapper img { display: block; width: 300px; height: 300px; }
    .instruction {
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
    .url {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }
  </style>
