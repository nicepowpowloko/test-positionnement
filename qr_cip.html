<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code – CIP | Real Conseil</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #2D4279;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: white;
      padding: 40px 20px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 48px;
    }
    .logo-badge {
      width: 48px;
      height: 48px;
      background: #A28A70;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
      letter-spacing: 0.5px;
    }
    .logo-text {
      font-size: 13px;
      letter-spacing: 3px;
      color: #A28A70;
      text-transform: uppercase;
      font-weight: 600;
    }
    .tag {
      font-size: 12px;
      letter-spacing: 2px;
      color: #A28A70;
      text-transform: uppercase;
      border: 1px solid rgba(162,138,112,0.4);
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 52px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 8px;
    }
    h1 span {
      color: #A28A70;
    }
    .formation-code {
      font-size: 16px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .qr-wrapper {
      background: white;
      padding: 22px;
      border-radius: 20px;
      margin-bottom: 36px;
      box-shadow: 0 0 0 8px rgba(162,138,112,0.15);
    }
    .instruction {
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
    .url {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div class="logo-row">
    <div class="logo-badge">RC</div>
    <div class="logo-text">Real Conseil</div>
  </div>

  <div class="tag">Test de positionnement</div>
  <h1>Conseiller en Insertion<br><span>Professionnelle</span></h1>
  <div class="formation-code">CIP</div>

  <div class="qr-wrapper">
    <div id="qrcode"></div>
  </div>

  <p class="instruction">Scannez pour accéder au test</p>
  <p class="url">nicepowpowloko.github.io/test-positionnement/positionement_cip.html</p>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    new QRCode(document.getElementById("qrcode"), {
      text: "https://nicepowpowloko.github.io/test-positionnement/positionement_cip.html",
      width: 300,
      height: 300,
      colorDark: "#2D4279",
      colorLight: "#ffffff",
      correctLevel: QRCode.CorrectLevel.H
    });
  </script>
</body>
</html>
