      border-radius: 20px;
      margin-bottom: 20px;

      font-size: 52px;
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 8px;

      color: rgba(255,255,255,0.45);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 48px;
    }
    .qr-wrapper {
      background: white;
      padding: 22px;
      border-radius: 20px;
      margin-bottom: 36px;

    .qr-wrapper img { display: block; width: 300px; height: 300px; }
    .instruction {
      font-size: 22px;
      color: rgba(255,255,255,0.85);
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
    .url {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.5px;
    }
